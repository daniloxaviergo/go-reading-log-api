project_name: "reading"
default_status: "To Do"
statuses: ["To Do", "In Progress", "Done"]
labels: []
definition_of_done: ["All unit tests pass", "All integration tests pass execution and verification", "go fmt and go vet pass with no errors", "Clean Architecture layers properly followed", "Error responses consistent with existing patterns", "HTTP status codes correct for response type", "Documentation updated in QWEN.md", "New code paths include error path tests", "HTTP handlers test both success and error responses", "Integration tests verify actual database interactions"]
date_format: yyyy-mm-dd
max_column_width: 20
default_editor: "vim"
auto_open_browser: true
default_port: 6420
remote_operations: false
auto_commit: true
zero_padded_ids: 3
bypass_git_hooks: true
check_active_branches: false
active_branch_days: 30
task_prefix: "RDL"
