version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: reading-log-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_DATABASE}
      # Timezone configuration for consistent date calculations
      # This ensures PostgreSQL uses the same timezone as application containers
      TZ: ${TZ_LOCATION:-America/Sao_Paulo}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - reading-log-network

  go-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reading-log-go-api
    environment:
      DB_HOST: postgres
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_DATABASE: ${DB_DATABASE}
      SERVER_PORT: ${SERVER_PORT}
      SERVER_HOST: ${SERVER_HOST}
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_FORMAT: ${LOG_FORMAT}
      # Timezone configuration for consistent date calculations
      TZ: ${TZ_LOCATION:-America/Sao_Paulo}
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - reading-log-network

  rails-api:
    build:
      context: ./rails-app
      dockerfile: Dockerfile
    container_name: reading-log-rails-api
    environment:
      DB_HOST: postgres
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_DATABASE: ${DB_DATABASE}
      RAILS_ENV: development
      PORT: 3001
      # Timezone configuration for consistent date calculations
      TZ: ${TZ_LOCATION:-America/Sao_Paulo}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - reading-log-network

networks:
  reading-log-network:
    driver: bridge

volumes:
  postgres_data:
